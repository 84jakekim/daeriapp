<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>그랩도우미</title>
    <style>
        :root {
            --bg-dark:   #0d1117;
            --bg-card:   #161c27;
            --bg-panel:  #1a2235;
            --bg-input:  #111827;
            --border:    #1f3a2a;
            --neon:      #2aff7a;
            --neon-dim:  #1acc60;
            --cyan:      #00e5ff;
            --text-main: #d4f5e2;
            --text-muted:#5a8a6a;
            --text-label:#7ecf9c;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: 'Arial', sans-serif;
            background: var(--bg-dark);
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(42,255,122,0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 90%, rgba(0,229,255,0.06) 0%, transparent 50%);
            min-height: 100vh;
            padding: 8px;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 0 30px rgba(42,255,122,0.07);
            overflow: hidden;
        }

        /* ── 헤더: 가로형 컴팩트 ── */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            background: rgba(42,255,122,0.03);
        }
        .header img {
            width: 36px; height: 36px;
            border-radius: 8px;
            flex-shrink: 0;
        }
        .header-text h1 {
            font-size: 1.05rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(90deg, var(--neon), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px rgba(42,255,122,0.4));
        }
        .header-text p {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 1px;
        }

        /* ── 콘텐츠 패딩 ── */
        .body-wrap { padding: 12px; }

        /* ── 모드 탭 ── */
        .mode-select {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        .mode-btn {
            padding: 9px 0;
            border: 1.5px solid var(--neon-dim);
            background: transparent;
            color: var(--neon-dim);
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            text-align: center;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, rgba(42,255,122,0.18), rgba(0,229,255,0.12));
            border-color: var(--neon);
            color: var(--neon);
            box-shadow: 0 0 10px rgba(42,255,122,0.2);
        }

        /* ── 입력 섹션 ── */
        .input-section {
            background: var(--bg-panel);
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: var(--text-label);
            font-size: 0.82rem;
            letter-spacing: 0.4px;
        }
        input[type="text"], select {
            width: 100%;
            padding: 11px 12px;
            border: 1.5px solid #1f3a2a;
            border-radius: 9px;
            font-size: 0.95rem;
            margin-bottom: 12px;
            background: var(--bg-input);
            color: var(--text-main);
        }
        input[type="text"]::placeholder { color: var(--text-muted); }
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--neon);
            box-shadow: 0 0 0 2px rgba(42,255,122,0.1);
        }
        select option { background: var(--bg-input); color: var(--text-main); }

        .radio-group {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            align-items: center;
        }
        .radio-group label {
            display: flex; align-items: center; gap: 5px;
            font-weight: normal; cursor: pointer;
            margin-bottom: 0; color: var(--text-main); font-size: 0.88rem;
        }
        .radio-group input[type="radio"] {
            width: 16px; height: 16px;
            accent-color: var(--neon); margin-bottom: 0;
        }
        .radio-row-label {
            font-weight: bold; color: var(--text-label);
            margin-bottom: 6px; display: block; font-size: 0.82rem;
        }
        .checkbox-group {
            display: flex; align-items: center;
            gap: 8px; margin-bottom: 12px;
        }
        .checkbox-group input {
            width: 16px; height: 16px; accent-color: var(--neon);
        }
        .checkbox-group label {
            margin-bottom: 0; font-weight: normal;
            color: var(--text-main); font-size: 0.88rem;
        }

        /* ── 지역 선택 ── */
        .region-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            padding: 10px;
            background: var(--bg-input);
            border-radius: 9px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .region-checkbox {
            display: flex; align-items: center; gap: 5px;
            padding: 7px 8px;
            background: rgba(42,255,122,0.05);
            border: 1px solid #1f3a2a;
            border-radius: 7px;
            cursor: pointer;
            color: var(--text-main);
            font-size: 0.82rem;
        }
        .region-checkbox input { accent-color: var(--neon); }

        /* ── 생성 버튼 ── */
        .generate-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #1acc60, #00b8cc);
            color: #000;
            border: none;
            border-radius: 11px;
            font-size: 0.95rem;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 0.5px;
            box-shadow: 0 0 16px rgba(42,255,122,0.25);
            transition: all 0.2s;
        }
        .generate-btn:active { transform: scale(0.98); }

        /* ── 정보 박스 ── */
        .info-box {
            background: rgba(42,255,122,0.06);
            border: 1px solid rgba(42,255,122,0.22);
            border-radius: 7px;
            padding: 8px 12px;
            margin-bottom: 10px;
            font-size: 0.82rem;
            color: var(--text-label);
        }

        /* ── 가격 편집 ── */
        .price-editor {
            background: var(--bg-panel);
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .price-editor > h3 {
            color: var(--text-label);
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        /* 비율 조정 박스 */
        .adjust-section {
            background: rgba(0,229,255,0.04);
            border: 1.5px solid rgba(0,229,255,0.2);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .adjust-section h4 {
            color: var(--cyan);
            font-size: 0.82rem;
            margin-bottom: 9px;
        }

        /* 비율 조정 행 */
        .pct-row {
            display: grid;
            grid-template-columns: 52px 1fr 52px;
            gap: 7px;
            align-items: center;
            margin-bottom: 8px;
        }
        .pct-input-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .pct-input-row input {
            flex: 1;
            padding: 9px;
            border-radius: 8px;
            border: 1.5px solid #1f3a2a;
            background: var(--bg-input);
            color: var(--text-main);
            text-align: center;
            font-size: 0.88rem;
            margin-bottom: 0;
        }
        .pct-apply-btn {
            padding: 9px 12px;
            border-radius: 8px;
            border: 1.5px solid rgba(0,229,255,0.4);
            background: rgba(0,229,255,0.12);
            color: var(--cyan);
            font-weight: bold;
            font-size: 0.82rem;
            cursor: pointer;
            white-space: nowrap;
        }

        /* 기준가 박스 */
        .bulk-section {
            border-top: 1px solid rgba(0,229,255,0.12);
            padding-top: 10px;
            margin-top: 4px;
        }
        .bulk-section h4 {
            color: var(--cyan);
            font-size: 0.82rem;
            margin-bottom: 8px;
        }
        .bulk-price-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 7px;
            align-items: center;
            margin-bottom: 7px;
        }
        .bulk-price-row input {
            padding: 10px;
            border-radius: 8px;
            border: 1.5px solid #1f3a2a;
            background: var(--bg-input);
            color: var(--neon);
            text-align: center;
            font-weight: bold;
            font-size: 0.95rem;
            margin-bottom: 0;
            width: 100%;
        }
        .bulk-delta-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr) 1.6fr;
            gap: 6px;
        }

        /* ── 범용 버튼 ── */
        .adj-btn {
            padding: 10px 0;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.88rem;
            cursor: pointer;
            text-align: center;
            transition: opacity 0.15s;
        }
        .adj-btn:active { opacity: 0.7; }
        .adj-btn.minus { background: #ff4d6d; color: white; }
        .adj-btn.minus2 { background: #cc3355; color: white; }
        .adj-btn.plus2 { background: #00b050; color: white; }
        .adj-btn.plus  { background: var(--neon); color: #000; }
        .adj-btn.set   {
            background: linear-gradient(135deg,#1acc60,#00b8cc);
            color: #000; font-weight: 800;
        }

        /* ── 가격 테이블 ── */
        .bulk-delete-btn {
            padding: 8px 12px;
            background: rgba(255,60,60,0.12);
            color: #ff6666;
            border: 1px solid #aa2222;
            border-radius: 7px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.82rem;
            margin-bottom: 8px;
        }
        .price-table {
            max-height: 380px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 9px;
            background: var(--bg-input);
        }
        .price-table::-webkit-scrollbar { width: 5px; }
        .price-table::-webkit-scrollbar-thumb { background: var(--neon-dim); border-radius: 3px; }

        .price-row {
            display: grid;
            grid-template-columns: 1fr 80px 34px 34px;
            gap: 5px;
            padding: 9px 10px;
            border-bottom: 1px solid #1a2a1e;
            align-items: center;
            cursor: pointer;
            color: var(--text-main);
        }
        .price-row:last-child { border-bottom: none; }
        .price-row:active { background: rgba(42,255,122,0.06) !important; }
        .price-row.selected { background: rgba(0,229,255,0.09) !important; border-left: 2px solid var(--cyan); }
        .price-row.pref-high   { background: rgba(42,255,122,0.07); }
        .price-row.pref-medium { background: rgba(255,220,50,0.05); }
        .price-row.pref-low    { background: rgba(255,140,0,0.04); }
        .price-row.pref-avoid  { background: rgba(255,60,60,0.05); }
        .price-row input[type="number"] {
            background: var(--bg-panel);
            color: var(--neon);
            border: 1px solid #1f3a2a;
            border-radius: 5px;
            padding: 5px 6px;
            text-align: right;
            font-weight: bold;
            font-size: 0.88rem;
            margin-bottom: 0;
            width: 100%;
        }
        .price-row .name-cell {
            font-size: 0.85rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .pref-badge {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 8px;
            font-size: 0.65rem;
            font-weight: bold;
            margin-left: 3px;
            vertical-align: middle;
        }
        .badge-high  { background:rgba(42,255,122,0.18); color:var(--neon); border:1px solid var(--neon-dim); }
        .badge-medium{ background:rgba(255,220,50,0.14); color:#ffe066; border:1px solid #aa9900; }
        .badge-low   { background:rgba(255,140,0,0.14);  color:#ffaa44; border:1px solid #aa6600; }
        .badge-avoid { background:rgba(255,60,60,0.14);  color:#ff6666; border:1px solid #aa2222; }
        .row-del-btn {
            padding: 5px 0;
            background: rgba(255,60,60,0.15);
            color: #ff6666;
            border: 1px solid #aa2222;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.78rem;
            text-align: center;
        }
        .row-ok-btn {
            padding: 5px 0;
            background: rgba(42,255,122,0.12);
            color: var(--neon);
            border: 1px solid var(--neon-dim);
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.78rem;
            text-align: center;
        }

        /* ── 결과 ── */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        .stat-item {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 10px;
            text-align: center;
        }
        .stat-number { font-size: 1.4rem; font-weight: bold; color: var(--neon); }
        .stat-label  { color: var(--text-muted); font-size: 0.78rem; margin-top: 2px; }
        .result-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 8px;
        }
        .result-header span { font-size: 0.9rem; font-weight: bold; color: var(--text-label); }
        .copy-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(42,255,122,0.18), rgba(0,229,255,0.12));
            color: var(--neon);
            border: 1.5px solid var(--neon-dim);
            border-radius: 7px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
        }
        .result-area {
            width: 100%;
            min-height: 160px;
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 0.82rem;
            background: var(--bg-input);
            color: var(--neon);
            resize: vertical;
        }

        .hidden { display: none; }
    </style>
</head>

        <div class="header-text">
            <h1>그랩도우미</h1>
            <p>전국 시/군/구 읍면동 완벽 지원</p>
        </div>

    <div class="body-wrap">

        <!-- 모드 탭 -->
        <div class="mode-select">
            <button class="mode-btn active" onclick="switchMode('local')">단거리 (시/군/구)</button>
            <button class="mode-btn" onclick="switchMode('regional')">중장거리 (전국)</button>
        </div>

        <!-- 단거리 -->
        <div id="localMode" class="input-section">
            <label>목적지 시/군 입력</label>
            <input type="text" id="localEnd" placeholder="예: 밀양, 부산, 양산, 창원 등"
                list="cityList" oninput="onCityInput()" autocomplete="off">
            <datalist id="cityList"></datalist>

            <div id="infoBox" class="info-box hidden"></div>

            <span class="radio-row-label">단위 선택</span>
            <div class="radio-group">
                <label><input type="radio" name="unitMode" value="gu" onchange="onUnitChange()"> 시/군/구 단위</label>
                <label><input type="radio" name="unitMode" value="dong" checked onchange="onUnitChange()"> 읍/면/동 단위</label>
            </div>

            <div id="guSelectWrap" class="hidden">
                <label>구 선택</label>
                <select id="guSelect" onchange="onGuChange()">
                    <option value="">— 전체 구 —</option>
                </select>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="includePrice" checked>
                <label for="includePrice">가격 포함</label>
            </div>
            <button class="generate-btn" onclick="generateLocal()">📍 추천 목록 생성</button>
        </div>

        <!-- 중장거리 -->
        <div id="regionalMode" class="input-section hidden">
            <label>출발지</label>
            <input type="text" id="regionalStart" placeholder="예: 창원시, 밀양시">

            <label>추천 지역권 선택</label>
            <div class="region-selector">
                <label class="region-checkbox"><input type="checkbox" value="전체" id="checkAll" onchange="toggleAll(this)"><span><b>전체</b></span></label>
                <label class="region-checkbox"><input type="checkbox" value="서울특별시" class="region-check"><span>서울</span></label>
                <label class="region-checkbox"><input type="checkbox" value="부산광역시" checked class="region-check"><span>부산</span></label>

                <label class="region-checkbox"><input type="checkbox" value="인천광역시" class="region-check"><span>인천</span></label>

let currentData = [];
let currentMode = 'local';
let selectedIndices = new Set();
let foundCity = null;

function findCity(input) {
    const raw = input.trim();
    const norm = raw.replace(/시$|군$|구$/, '').trim();
    const METRO = ['서울특별시','부산광역시','대구광역시','인천광역시','광주광역시','대전광역시','울산광역시','세종특별자치시'];
    for (const prov of METRO) {
        const shortProv = prov.replace(/특별시$|광역시$|특별자치시$/, '');
        if (raw === prov || raw === shortProv || norm === shortProv)
            return { province: prov, cityName: prov, cityData: KOREA_DATA.data[prov], hasGu: true, isMetro: true };
    }
    for (const [province, cities] of Object.entries(KOREA_DATA.data)) {
        if (METRO.includes(province)) continue;
        for (const [cityName, cityData] of Object.entries(cities)) {
            const cityNorm = cityName.replace(/시$|군$/, '');
            if (cityName === raw || cityNorm === raw || cityNorm === norm || cityName === norm ||
                cityName.startsWith(norm) || cityNorm.startsWith(norm)) {
                const hasGu = !cityData.dongs;
                return { province, cityName, cityData, hasGu, isMetro: false };
            }
        }
    }
    return null;
}

function updateCityDatalist() {
    const dl = document.getElementById('cityList');
    dl.innerHTML = '';
    ['서울','부산','대구','인천','광주','대전','울산','세종'].forEach(n => {
        const o = document.createElement('option'); o.value = n; dl.appendChild(o);
    });
    for (const [prov, cities] of Object.entries(KOREA_DATA.data)) {
        if (['서울특별시','부산광역시','대구광역시','인천광역시','광주광역시','대전광역시','울산광역시','세종특별자치시'].includes(prov)) continue;
        for (const cityName of Object.keys(cities)) {
            const o = document.createElement('option'); o.value = cityName; dl.appendChild(o);
        }
    }
}

function onCityInput() {
    foundCity = findCity(document.getElementById('localEnd').value);
    updateInfoBox(); updateGuSelect();
}
function onUnitChange() { updateGuSelect(); updateInfoBox(); }
function onGuChange() { updateInfoBox(); }

function updateInfoBox() {
    const box = document.getElementById('infoBox');
    if (!foundCity) { box.classList.add('hidden'); return; }
    const unit = document.querySelector('input[name="unitMode"]:checked').value;
    const { cityName, hasGu, isMetro } = foundCity;
    let msg = '';
    if (isMetro || hasGu) {
        if (unit === 'gu') {
            msg = `📍 <b>${cityName}</b> — 구 ${Object.keys(foundCity.cityData).length}개`;
        } else {
            const selGu = document.getElementById('guSelect').value;
            if (selGu) {
                msg = `📍 <b>${cityName} ${selGu}</b> — ${foundCity.cityData[selGu]?.dongs?.length||0}개 동`;
            } else {
                let t=0; Object.values(foundCity.cityData).forEach(g=>t+=(g.dongs||[]).length);
                msg = `📍 <b>${cityName}</b> 전체 — ${t}개 읍/면/동`;
            }
        }
    } else {
        msg = `📍 <b>${cityName}</b> — ${(foundCity.cityData.dongs||[]).length}개 읍/면/동`;
    }
    box.innerHTML = msg; box.classList.remove('hidden');
}

function updateGuSelect() {
    const wrap = document.getElementById('guSelectWrap');
    const sel = document.getElementById('guSelect');
    const unit = document.querySelector('input[name="unitMode"]:checked').value;
    if (!foundCity || !foundCity.hasGu || unit === 'gu') { wrap.classList.add('hidden'); return; }
    wrap.classList.remove('hidden');
    sel.innerHTML = '<option value="">— 전체 구 —</option>';
    Object.keys(foundCity.cityData).forEach(gu => {
        const o = document.createElement('option'); o.value = gu; o.textContent = gu; sel.appendChild(o);
    });
}

function switchMode(mode) {
    currentMode = mode;
    document.getElementById('localMode').classList.toggle('hidden', mode !== 'local');
    document.getElementById('regionalMode').classList.toggle('hidden', mode !== 'regional');
    document.querySelectorAll('.mode-btn').forEach((btn,i) =>
        btn.classList.toggle('active', (i===0&&mode==='local')||(i===1&&mode==='regional')));
    document.getElementById('priceEditor').classList.add('hidden');
    document.getElementById('resultSection').classList.add('hidden');
}
function toggleAll(cb) { document.querySelectorAll('.region-check').forEach(c=>c.checked=cb.checked); }

function generateLocal() {
    const input = document.getElementById('localEnd').value.trim();
    const includePrice = document.getElementById('includePrice').checked;
    const unit = document.querySelector('input[name="unitMode"]:checked').value;
    if (!input) { alert('목적지를 입력해주세요.'); return; }
    const found = findCity(input);
    if (!found) { alert(`'${input}' 지역을 찾을 수 없습니다.`); return; }
    currentData = [];
    const BASE = 25;
    if (unit === 'gu') {
        if (found.isMetro || found.hasGu) {
            Object.entries(found.cityData).forEach(([guName, guData]) => {
                currentData.push({ name: guName, fare: BASE + Math.floor(Math.random()*16)-5, preference: guData.pref||'medium' });
            });
        } else {
            currentData.push({ name: found.cityName, fare: BASE, preference: found.cityData.pref||'medium' });
        }
    } else {
        const selGu = document.getElementById('guSelect').value;
        const guEntries = (found.isMetro || found.hasGu)
            ? (selGu ? [[selGu, found.cityData[selGu]]] : Object.entries(found.cityData))
            : [[null, found.cityData]];
        guEntries.forEach(([, guData]) => {
            (guData.dongs||[]).forEach(dong => {
                const name = dong.replace(/\d+동$/, '동');
                if (!currentData.find(i=>i.name===name))
                    currentData.push({ name, fare: BASE+Math.floor(Math.random()*20)-8, preference: guData.pref||'medium' });
            });
        });
    }
    if (!currentData.length) { alert('데이터가 없습니다.'); return; }
    showPriceEditor(); updateResult(includePrice);
}

function generateRegional() {
    const start = document.getElementById('regionalStart').value.trim().replace(/시$|군$|구$/, '');
    const includePrice = document.getElementById('regionalIncludePrice').checked;
    const selected = Array.from(document.querySelectorAll('.region-check:checked')).map(c=>c.value);
    if (!start) { alert('출발지를 입력해주세요.'); return; }
    if (!selected.length) { alert('지역권을 선택해주세요.'); return; }
    currentData = [];
    selected.forEach(province => {
        const cities = KOREA_DATA.data[province];
        if (!cities) return;
        Object.entries(cities).forEach(([cityName, cityData]) => {
            if (cityName.replace(/시$|군$/,'') === start) return;
            const pref = cityData.pref || (typeof cityData==='object'&&!cityData.dongs ? Object.values(cityData)[0]?.pref||'medium' : 'medium');
            currentData.push({ name: cityName, fare: Math.floor(Math.random()*100)+30, preference: pref });
        });
    });
    if (!currentData.length) { alert('데이터가 없습니다.'); return; }
    showPriceEditor(); updateResult(includePrice);
}

function showPriceEditor() {
    const table = document.getElementById('priceTable');
    table.innerHTML = ''; selectedIndices.clear();
    const badges = {
        high:'<span class="pref-badge badge-high">선호</span>',
        medium:'<span class="pref-badge badge-medium">보통</span>',
        low:'<span class="pref-badge badge-low">비선호</span>',
        avoid:'<span class="pref-badge badge-avoid">회피</span>'
    };
    currentData.forEach((item, idx) => {
        const row = document.createElement('div');
        row.className = `price-row pref-${item.preference}`;
        row.onclick = e => { if (e.target.tagName!=='INPUT'&&e.target.tagName!=='BUTTON') toggleSel(idx, row); };
        row.innerHTML = `
            <div class="name-cell">${item.name}${badges[item.preference]||''}</div>
            <input type="number" id="price_${idx}" value="${item.fare}" min="1"
                onchange="updatePrice(${idx})">
            <button class="row-ok-btn" onclick="updatePrice(${idx});event.stopPropagation();">✓</button>
            <button class="row-del-btn" onclick="deleteSingle(${idx});event.stopPropagation();">✕</button>`;
        table.appendChild(row);
    });
    document.getElementById('priceEditor').classList.remove('hidden');
}

function toggleSel(idx, row) {
    if (selectedIndices.has(idx)) { selectedIndices.delete(idx); row.classList.remove('selected'); }
    else { selectedIndices.add(idx); row.classList.add('selected'); }
}
function deleteSelected() {
    if (!selectedIndices.size) { alert('삭제할 항목을 선택하세요.'); return; }
    currentData = currentData.filter((_,i)=>!selectedIndices.has(i));
    showPriceEditor(); refreshResult();
}
function deleteSingle(idx) { currentData.splice(idx,1); showPriceEditor(); refreshResult(); }
function updatePrice(idx) {
    const v = parseInt(document.getElementById(`price_${idx}`).value);
    if (v>0) { currentData[idx].fare=v; refreshResult(); }
}
function adjustPrices(pct) {
    if (!currentData.length) return;
    currentData.forEach((item,i) => {
        item.fare = Math.max(1, Math.round(item.fare*(1+pct/100)));
        const inp = document.getElementById(`price_${i}`);
        if (inp) inp.value = item.fare;
    });
    refreshResult();
}
function applyCustomPercent() {
    const v = parseFloat(document.getElementById('adjustPercent').value);
    if (isNaN(v)||v<-100||v>100) { alert('-100 ~ 100 사이 값을 입력하세요.'); return; }
    adjustPrices(v);
    document.getElementById('adjustPercent').value = '';
}
function applyBulkPrice(delta) {
    const inp = document.getElementById('bulkBasePrice');
    inp.value = Math.max(1, (parseInt(inp.value)||0) + delta);
}
function setBulkPrice() {
    const v = parseInt(document.getElementById('bulkBasePrice').value);
    if (!v||v<1) { alert('기준가를 입력해주세요.'); return; }
    currentData.forEach((item,i) => {
        item.fare = v;
        const inp = document.getElementById(`price_${i}`);
        if (inp) inp.value = v;
    });
    refreshResult();
}
function refreshResult() {
    updateResult(currentMode==='local'
        ? document.getElementById('includePrice').checked
        : document.getElementById('regionalIncludePrice').checked);
}
function updateResult(includePrice) {
    const result = includePrice
        ? currentData.map(i=>`${i.name}#${i.fare}`).join(',')
        : currentData.map(i=>i.name).join(',');
    document.getElementById('resultArea').value = result;
    document.getElementById('resultSection').classList.remove('hidden');
    const total = currentData.length;
    const avg = total ? Math.round(currentData.reduce((s,i)=>s+i.fare,0)/total) : 0;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('avgPrice').textContent = avg;
}
function copyResult() {
    const area = document.getElementById('resultArea');
    area.select();
    document.execCommand('copy');
    alert('복사되었습니다!');
}

updateCityDatalist();
</script>
</body>
</html>
